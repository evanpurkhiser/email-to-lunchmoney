name: main

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - run: pnpm install --frozen-lockfile
      - run: prek run --all-files
      - run: pnpm run test

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - run: pnpm install --frozen-lockfile
      - name: Configure wrangler
        run: |
          sed -i "s/YOUR_DATABASE_ID_HERE/${VARS_DATABASE_ID}/" wrangler.jsonc
          sed -i "s/youremail@gmail.com/${VARS_ACCEPTED_EMAIL}/" wrangler.jsonc
        env:
          VARS_DATABASE_ID: ${{ vars.DATABASE_ID }}
          VARS_ACCEPTED_EMAIL: ${{ vars.ACCEPTED_EMAIL }}
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply email-to-lunchmoney --remote
      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
